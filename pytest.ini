[pytest]
# pytest.ini - Pytest Configuration File
# This file tells pytest how to run tests

# Test discovery patterns
# pytest will look for files matching these patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
# -v: verbose (show each test)
# -s: show print statements from tests
# --tb=short: shorter traceback format for errors
addopts = -v -s --tb=short

# Test paths
# Only look for tests in the 'tests/' directory
testpaths = tests

# Markers for organizing tests
# Use: @pytest.mark.unit, @pytest.mark.integration, etc.
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use database, external services)
    slow: Slow tests
